<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrappy POS Definitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { user-select: none; -webkit-user-select: none; background-color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
        input, textarea { user-select: text; -webkit-user-select: text; }
        .tab-active { color: #ea580c; border-bottom: 4px solid #ea580c; background-color: #fff7ed; }
        .tab-inactive { color: #94a3b8; }
        ::-webkit-scrollbar { width: 0px; }
        
        /* Botones del Modal */
        .btn-meat:checked + div { border-color: #ea580c; background-color: #fff7ed; color: #9a3412; border-width: 2px; }
        .timer-alert { color: #ef4444; font-weight: 900; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .slide-in { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-slate-800">

    <!-- Header -->
    <header class="bg-orange-600 text-white p-4 shadow-md flex justify-between items-center z-40">
        <h1 class="text-3xl font-black italic tracking-tighter">SCRAPPY</h1>
        <div id="sync-status" class="text-[10px] font-bold bg-orange-800 px-3 py-1 rounded-full uppercase tracking-widest shadow-inner">
            <i class="fa-solid fa-cloud-arrow-up mr-1"></i> Offline
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto pb-24 relative">
        
        <!-- ==========================================
             VISTA 1: CAPTURA (POS)
             ========================================== -->
        <section id="view-pos" class="p-4 flex flex-col gap-4 h-full">
            
            <!-- Carrito -->
            <div class="bg-white border-2 border-slate-200 rounded-3xl p-4 shadow-sm flex-shrink-0">
                <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-2">
                    <span class="font-black text-2xl text-slate-800">TOTAL: $<span id="pos-total" class="text-orange-600">0</span></span>
                    <button onclick="resetCart()" class="text-[10px] font-black uppercase text-red-500 bg-red-50 px-3 py-2 rounded-xl active:bg-red-100">Vaciar</button>
                </div>
                <div id="pos-cart-list" class="text-sm font-bold text-slate-600 max-h-32 overflow-y-auto space-y-2 pr-2">
                    <p class="text-slate-400 italic text-center py-2 font-normal">No hay productos en el pedido.</p>
                </div>
            </div>

            <!-- Navegación del Menú (Botones Grandes) -->
            <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-200 flex-1 flex flex-col">
                
                <!-- Vista Categorías -->
                <div id="pos-categories" class="grid grid-cols-2 gap-3 h-full content-start">
                    <!-- Inyectado por JS -->
                </div>

                <!-- Vista Productos (Oculta inicialmente) -->
                <div id="pos-items" class="hidden flex-col h-full">
                    <button onclick="showCategories()" class="self-start mb-4 text-orange-600 font-black uppercase text-sm flex items-center gap-2 bg-orange-50 px-4 py-2 rounded-xl active:bg-orange-100">
                        <i class="fa-solid fa-chevron-left"></i> Volver a Menú
                    </button>
                    <h3 id="current-cat-title" class="font-black text-xl italic text-slate-300 uppercase mb-3 px-1">Categoría</h3>
                    <div id="pos-items-grid" class="grid grid-cols-2 gap-3 overflow-y-auto pb-2 slide-in">
                        <!-- Inyectado por JS -->
                    </div>
                </div>

            </div>

            <!-- Formulario y Botón de Envío -->
            <div class="bg-slate-800 rounded-3xl p-5 shadow-lg flex-shrink-0">
                <div class="space-y-3 mb-4">
                    <input type="text" id="cust-name" placeholder="Nombre del cliente *" class="w-full p-4 bg-slate-700 text-white placeholder-slate-400 border border-slate-600 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold">
                    <input type="text" id="cust-addr" placeholder="Dirección o 'Local' *" class="w-full p-4 bg-slate-700 text-white placeholder-slate-400 border border-slate-600 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold">
                    <input type="tel" id="cust-phone" placeholder="Celular (Opcional)" class="w-full p-4 bg-slate-700 text-white placeholder-slate-400 border border-slate-600 rounded-2xl focus:ring-2 focus:ring-orange-500 outline-none font-bold">
                </div>
                <button onclick="saveOrder()" id="btn-save" class="w-full bg-orange-600 text-white font-black text-xl py-5 rounded-2xl shadow-xl active:scale-95 transition-transform flex justify-center items-center gap-3 uppercase italic tracking-widest">
                    <span id="save-text">Enviar a Cocina</span> <i class="fa-solid fa-fire"></i>
                </button>
            </div>
        </section>

        <!-- ==========================================
             VISTA 2: COCINA
             ========================================== -->
        <section id="view-kitchen" class="p-4 hidden space-y-4 bg-slate-100 min-h-full">
            <h2 class="text-xl font-black text-slate-800 uppercase italic tracking-tighter"><span class="text-2xl">🍳</span> Pedidos Activos</h2>
            <div id="kitchen-list" class="space-y-4 pb-10"></div>
        </section>

        <!-- ==========================================
             VISTA 3: REPARTO
             ========================================== -->
        <section id="view-delivery" class="p-4 hidden space-y-4 bg-slate-100 min-h-full">
            <h2 class="text-xl font-black text-slate-800 uppercase italic tracking-tighter"><span class="text-2xl">🛵</span> Listos p' Reparto</h2>
            <div id="delivery-list" class="space-y-4 pb-10"></div>
        </section>

    </main>

    <!-- Modal Personalización -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden justify-center items-end z-[60]">
        <div class="bg-white rounded-t-[2.5rem] w-full max-w-lg p-6 pb-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-start border-b border-slate-100 pb-4 mb-4">
                <div>
                    <h3 id="m-name" class="text-3xl font-black italic uppercase tracking-tighter text-slate-800">Producto</h3>
                    <p class="text-orange-600 font-black text-2xl">$<span id="m-price">0</span></p>
                </div>
                <button onclick="closeModal()" class="bg-slate-100 text-slate-400 w-10 h-10 rounded-full font-black text-xl flex items-center justify-center">&times;</button>
            </div>

            <!-- Proteína -->
            <div id="m-meat-sec" class="mb-6 hidden">
                <p class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-3">🥩 Carne Requerida:</p>
                <div class="grid grid-cols-2 gap-3" id="meat-grid"></div>
                <div id="m-mixed-opts" class="mt-4 p-4 bg-orange-50 rounded-2xl border-2 border-orange-200 hidden">
                    <p class="text-[10px] font-black text-orange-800 uppercase tracking-widest mb-3">Elige 2 carnes pal Mixto:</p>
                    <div class="flex gap-2" id="mixed-grid"></div>
                </div>
            </div>

            <!-- Quitar -->
            <div id="m-veg-sec" class="mb-6 hidden">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">❌ Quitar:</p>
                <div class="flex flex-wrap gap-2" id="veg-grid"></div>
            </div>

            <!-- Extras Fijos -->
            <div id="m-ext-sec" class="mb-6 hidden">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">➕ Complementos:</p>
                <div class="flex flex-wrap gap-2" id="ext-grid"></div>
            </div>

            <!-- Extra $10 -->
            <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl mb-6 border border-slate-200">
                <span class="font-black text-sm uppercase italic text-slate-700">Cualquier Extra ($10)</span>
                <div class="flex items-center gap-4">
                    <button onclick="changeGenExt(-1)" class="w-10 h-10 bg-white border border-slate-300 rounded-full font-black text-slate-400 text-xl">-</button>
                    <span id="m-gen-val" class="font-black text-2xl text-orange-600 w-6 text-center">0</span>
                    <button onclick="changeGenExt(1)" class="w-10 h-10 bg-orange-600 text-white rounded-full font-black text-xl shadow-md">+</button>
                </div>
            </div>

            <!-- Notas y Cantidad -->
            <div class="mb-8">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">📝 Notas / Detalles:</p>
                <input type="text" id="m-notes" placeholder="Ej. Sin hielo, aderezo aparte..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-orange-500 font-bold mb-4">
                
                <div class="flex items-center justify-between bg-slate-800 p-3 rounded-2xl shadow-lg">
                    <span class="font-black text-white ml-3 uppercase tracking-widest text-sm">Cantidad:</span>
                    <div class="flex items-center gap-5 bg-slate-700 rounded-xl p-1">
                        <button onclick="changeQty(-1)" class="w-12 h-12 text-2xl font-black text-slate-400 active:scale-90">-</button>
                        <span id="m-qty" class="text-2xl font-black w-8 text-center text-white">1</span>
                        <button onclick="changeQty(1)" class="w-12 h-12 text-2xl font-black text-orange-500 active:scale-90">+</button>
                    </div>
                </div>
            </div>

            <button onclick="addToCart()" class="w-full bg-orange-600 text-white font-black py-6 rounded-2xl text-xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-transform">
                Agregar Producto
            </button>
        </div>
    </div>

    <!-- Nav Inferior -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 flex z-50 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] pb-safe">
        <button onclick="switchTab('pos')" id="btn-pos" class="flex-1 py-4 flex flex-col items-center tab-active transition-all">
            <i class="fa-solid fa-cash-register text-2xl mb-1"></i><span class="text-[9px] font-black uppercase tracking-widest">Captura</span>
        </button>
        <button onclick="switchTab('kitchen')" id="btn-kitchen" class="flex-1 py-4 flex flex-col items-center tab-inactive transition-all relative border-x border-slate-100">
            <i class="fa-solid fa-fire text-2xl mb-1"></i><span class="text-[9px] font-black uppercase tracking-widest">Cocina</span>
            <span id="badge-k" class="absolute top-2 right-4 bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full hidden border-2 border-white">0</span>
        </button>
        <button onclick="switchTab('delivery')" id="btn-delivery" class="flex-1 py-4 flex flex-col items-center tab-inactive transition-all relative">
            <i class="fa-solid fa-motorcycle text-2xl mb-1"></i><span class="text-[9px] font-black uppercase tracking-widest">Reparto</span>
            <span id="badge-d" class="absolute top-2 right-4 bg-orange-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full hidden border-2 border-white">0</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. DATOS DEL MENÚ
        // ==========================================
        const menu = [
            { cat: "Hamburguesas Res", icon: "🍔", items: [
                { id: 'r1', n: "Scrappy Clasica", p: 60, v: true, e: true },
                { id: 'r2', n: "Tocino Crunch", p: 70, v: true, e: true },
                { id: 'r3', n: "Double Cheese Chipotle", p: 75, v: true, e: true },
                { id: 'r4', n: "Big Scrappy", p: 80, v: true, e: true }
            ]},
            { cat: "Hamb. Pollo", icon: "🐔", items: [
                { id: 'p1', n: "Simple Chiken", p: 60, v: true, e: true },
                { id: 'p2', n: "Big Chiken", p: 70, v: true, e: true }
            ]},
            { cat: "Lonches & Más", icon: "🥪", items: [
                { id: 'e1', n: "Lonche", p: 44, v: true, e: true, meat: true },
                { id: 'e2', n: "Sandwich", p: 30, v: true, e: true, meat: true },
                { id: 'e3', n: "2 Sincronizadas", p: 45, v: true, e: true, meat: true },
                { id: 'e4', n: "2 Quesadillas Harina", p: 50, v: false, e: true }
            ]},
            { cat: "Snacks", icon: "🍟", items: [
                { id: 's1', n: "Alitas (Medio Kilo)", p: 100 },
                { id: 's2', n: "Boneless", p: 99 },
                { id: 's3', n: "Papas Gajo", p: 45 },
                { id: 's4', n: "Papas Gajo Queso", p: 65 },
                { id: 's5', n: "Papa Francesa", p: 35 },
                { id: 's6', n: "Dedos de Queso", p: 80 },
                { id: 's7', n: "Aros Cebolla", p: 60 },
                { id: 's8', n: "Hot Dog Sencillo", p: 25, v: true, e: true },
                { id: 's9', n: "Hot Dog Tocino", p: 32, v: true, e: true }
            ]},
            { cat: "Bebidas & Postres", icon: "🥤", items: [
                { id: 'b1', n: "Coca 500ml", p: 24 }, { id: 'b2', n: "Coca 250ml", p: 12 },
                { id: 'b3', n: "Malteada", p: 25 }, { id: 'b4', n: "Perla Explosiva", p: 50 },
                { id: 'b5', n: "Waffles (3 Ing)", p: 45 }, { id: 'b6', n: "Crepas (3 Ing)", p: 40 }
            ]}
        ];

        const VEG = ["Jitomate", "Cebolla", "Lechuga", "Jalapeño", "Aguacate"];
        const EXT = [{ n: "Papas Francesa", p: 18 }, { n: "Aros Cebolla", p: 10 }, { n: "Aderezo Extra", p: 10 }, { n: "Salchicha Frita", p: 10 }];
        const MEATS = ["Pierna", "Jamón", "Pollo", "Mixto"];

        // ==========================================
        // 2. ESTADO GLOBAL Y SMARTSYNC
        // ==========================================
        let cart = [];
        let curItem = null;
        let editId = null;
        
        // SmartSync: La verdad absoluta está primero en LocalStorage
        let localOrders = JSON.parse(localStorage.getItem('scrappy_smartsync')) || [];
        
        let db, colRef;
        let isOnline = false;

        // ==========================================
        // 3. INTERFAZ: MENÚ DE BOTONES
        // ==========================================
        function initMenuUI() {
            const catGrid = document.getElementById('pos-categories');
            catGrid.innerHTML = menu.map((c, i) => `
                <button onclick="showItems(${i})" class="bg-white border-2 border-slate-200 rounded-3xl p-6 flex flex-col items-center justify-center shadow-sm active:scale-95 active:border-orange-500 transition-all group aspect-square">
                    <span class="text-5xl mb-3 group-active:scale-110 transition-transform">${c.icon}</span>
                    <span class="font-black text-slate-700 text-xs uppercase tracking-widest text-center">${c.cat}</span>
                </button>
            `).join('');
            updateViews(); // Renderizar órdenes guardadas offlne al inicio
            setInterval(updateClocks, 1000);
        }

        window.showCategories = () => {
            document.getElementById('pos-items').classList.replace('flex', 'hidden');
            document.getElementById('pos-categories').classList.replace('hidden', 'grid');
        };

        window.showItems = (catIdx) => {
            const cat = menu[catIdx];
            document.getElementById('current-cat-title').innerText = `${cat.icon} ${cat.cat}`;
            document.getElementById('pos-categories').classList.replace('grid', 'hidden');
            
            const grid = document.getElementById('pos-items-grid');
            grid.innerHTML = cat.items.map(it => `
                <button onclick='openM(${JSON.stringify(it)})' class="bg-orange-50 border-2 border-orange-100 rounded-2xl p-4 flex flex-col justify-between text-left active:bg-orange-100 active:border-orange-400 transition-all min-h-[100px] shadow-sm">
                    <span class="font-black text-slate-800 leading-tight text-sm italic">${it.n}</span>
                    <span class="bg-orange-500 text-white font-black text-[10px] px-3 py-1 rounded-full self-start mt-2">$${it.p}</span>
                </button>
            `).join('');
            
            document.getElementById('pos-items').classList.replace('hidden', 'flex');
        };

        // ==========================================
        // 4. LÓGICA DEL MODAL DE PERSONALIZACIÓN
        // ==========================================
        window.openM = (it) => {
            curItem = { ...it, base: it.p, qty: 1, removed: [], extras: [], meat: null, mixed: [], gen: 0, notes: "" };
            document.getElementById('m-name').innerText = it.n; document.getElementById('m-price').innerText = it.p;
            document.getElementById('m-qty').innerText = 1; document.getElementById('m-gen-val').innerText = 0; document.getElementById('m-notes').value = "";
            
            const vSec = document.getElementById('m-veg-sec'); it.v ? (vSec.classList.remove('hidden'), renderVeg()) : vSec.classList.add('hidden');
            const eSec = document.getElementById('m-ext-sec'); it.e ? (eSec.classList.remove('hidden'), renderExt()) : eSec.classList.add('hidden');
            const mSec = document.getElementById('m-meat-sec'); it.meat ? (mSec.classList.remove('hidden'), renderMeat()) : mSec.classList.add('hidden');
            
            document.getElementById('modal').classList.replace('hidden', 'flex');
        };

        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');

        function renderVeg() { document.getElementById('veg-grid').innerHTML = VEG.map(v => `<button onclick="togVeg('${v}')" class="px-4 py-2 border-2 border-slate-200 rounded-xl text-xs font-black text-slate-400 active:scale-95 transition-all ${curItem.removed.includes(v) ? 'bg-red-50 border-red-500 text-red-500' : 'bg-white'}">Sin ${v}</button>`).join(''); }
        window.togVeg = (v) => { const idx = curItem.removed.indexOf(v); idx === -1 ? curItem.removed.push(v) : curItem.removed.splice(idx, 1); renderVeg(); };

        function renderExt() { document.getElementById('ext-grid').innerHTML = EXT.map((e, i) => `<button onclick="togExt(${i})" class="px-4 py-2 border-2 border-slate-200 rounded-xl text-xs font-black text-slate-400 active:scale-95 transition-all ${curItem.extras.find(x=>x.n===e.n) ? 'bg-green-50 border-green-500 text-green-600' : 'bg-white'}">+ ${e.n} ($${e.p})</button>`).join(''); }
        window.togExt = (i) => { const e = EXT[i]; const idx = curItem.extras.findIndex(x => x.n === e.n); idx === -1 ? curItem.extras.push(e) : curItem.extras.splice(idx, 1); renderExt(); calcM(); };

        function renderMeat() { document.getElementById('meat-grid').innerHTML = MEATS.map(m => `<label class="cursor-pointer"><input type="radio" name="m" class="hidden btn-meat" ${curItem.meat === m ? 'checked' : ''} onchange="setMeat('${m}')"><div class="border-2 border-slate-200 rounded-2xl p-4 text-center text-xs font-black text-slate-500 transition-all uppercase">${m}</div></label>`).join(''); }
        window.setMeat = (m) => { curItem.meat = m; curItem.base = m === 'Mixto' ? 50 : curItem.p; const mixSec = document.getElementById('m-mixed-opts'); m === 'Mixto' ? (mixSec.classList.remove('hidden'), renderMixed()) : (mixSec.classList.add('hidden'), curItem.mixed=[]); calcM(); };

        function renderMixed() { const opts = ["Pierna", "Jamón", "Pollo"]; document.getElementById('mixed-grid').innerHTML = opts.map(o => `<label class="flex-1 cursor-pointer"><input type="checkbox" class="hidden btn-meat" ${curItem.mixed.includes(o) ? 'checked' : ''} onchange="togMix('${o}')"><div class="border-2 border-orange-200 bg-white rounded-xl p-3 text-center text-[10px] font-black text-orange-600 uppercase transition-all">${o}</div></label>`).join(''); }
        window.togMix = (o) => { const idx = curItem.mixed.indexOf(o); if(idx === -1) { if(curItem.mixed.length >= 2) return alert("Solo 2 carnes!"); curItem.mixed.push(o); } else { curItem.mixed.splice(idx, 1); } renderMixed(); };

        window.changeGenExt = (v) => { if(curItem.gen+v >= 0) curItem.gen += v; document.getElementById('m-gen-val').innerText = curItem.gen; calcM(); };
        window.changeQty = (v) => { if(curItem.qty+v >= 1) curItem.qty += v; document.getElementById('m-qty').innerText = curItem.qty; calcM(); };
        
        function calcM() { let u = curItem.base; curItem.extras.forEach(x => u += x.p); u += (curItem.gen * 10); curItem.total = u * curItem.qty; document.getElementById('m-price').innerText = curItem.total; }

        window.addToCart = () => {
            if(curItem.meat !== null && !curItem.meat) return alert("Elige la carne.");
            if(curItem.meat === 'Mixto' && curItem.mixed.length !== 2) return alert("Elige exactamente 2 carnes para el Mixto.");
            curItem.notes = document.getElementById('m-notes').value.trim();
            cart.push(curItem); renderCart(); closeModal();
        };

        // ==========================================
        // 5. CARRITO Y POS
        // ==========================================
        function renderCart() {
            const cont = document.getElementById('pos-cart-list');
            const totEl = document.getElementById('pos-total');
            if(!cart.length) { cont.innerHTML = `<p class="text-slate-400 italic text-center py-2 font-normal">Agrega productos del menú...</p>`; totEl.innerText = 0; return; }
            let t = 0;
            cont.innerHTML = cart.map((it, i) => {
                t += it.total;
                let dets = [];
                if(it.meat) dets.push(`<span class="text-orange-700">🥩 ${it.meat === 'Mixto' ? 'Mixto ('+it.mixed.join('+')+')' : it.meat}</span>`);
                if(it.removed.length) dets.push(`<span class="text-red-500">❌ Sin: ${it.removed.join(', ')}</span>`);
                if(it.extras.length) dets.push(`<span class="text-green-600">➕ ${it.extras.map(x=>x.n).join(', ')}</span>`);
                if(it.gen) dets.push(`<span class="text-purple-600">➕ Extras Gen: x${it.gen}</span>`);
                if(it.notes) dets.push(`<span class="text-blue-500">Nota: ${it.notes}</span>`);
                
                return `<div class="bg-slate-50 border border-slate-100 rounded-xl p-3 flex justify-between items-start">
                    <div class="flex-1 pr-2">
                        <div class="font-black text-slate-800 leading-tight">${it.qty}x ${it.n}</div>
                        ${dets.length ? `<div class="text-[10px] uppercase font-bold tracking-tighter mt-1 space-y-0.5 border-l-2 border-slate-200 pl-2">${dets.join('<br>')}</div>` : ''}
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="font-black text-orange-600 text-lg">$${it.total}</span>
                        <button onclick="remCart(${i})" class="text-[10px] text-red-400 font-black uppercase mt-1">Borrar</button>
                    </div>
                </div>`;
            }).join('');
            totEl.innerText = t;
        }
        
        window.remCart = (i) => { cart.splice(i, 1); renderCart(); };
        window.resetCart = () => { if(confirm("¿Limpiar todo el pedido?")) { cart = []; renderCart(); document.getElementById('cust-name').value = ""; document.getElementById('cust-addr').value = ""; document.getElementById('cust-phone').value = ""; editId = null; document.getElementById('save-text').innerText = "Enviar a Cocina"; } };

        // ==========================================
        // 6. MOTOR SMARTSYNC (FUSIÓN CLOUD-LOCAL)
        // ==========================================
        async function startFirebase() {
            try {
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'scrappy-pos';
                if (!config) return; // Se queda offline puro

                const app = initializeApp(config);
                const auth = getAuth(app);
                db = getFirestore(app);

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isOnline = true;
                        document.getElementById('sync-status').innerHTML = `<i class="fa-solid fa-cloud-arrow-down mr-1"></i> Nube Ok`;
                        document.getElementById('sync-status').classList.replace('bg-orange-800', 'bg-green-600');
                        colRef = collection(db, 'artifacts', appId, 'public', 'data', 'pedidos_smartsync');
                        listenCloud();
                    }
                });
            } catch (e) { console.error("Error nube", e); }
        }

        // Fusión de datos: La nube entra y se mezcla con lo local
        function listenCloud() {
            if(!colRef) return;
            onSnapshot(colRef, (snap) => {
                let changed = false;
                snap.forEach(docSnap => {
                    const cloudOrder = { id: docSnap.id, ...docSnap.data() };
                    const localIdx = localOrders.findIndex(l => l.id === cloudOrder.id);
                    
                    if (localIdx > -1) {
                        // Conflicto: Gana el que tenga el updatedAt más reciente
                        if (cloudOrder.updatedAt > localOrders[localIdx].updatedAt) {
                            localOrders[localIdx] = cloudOrder;
                            changed = true;
                        }
                    } else {
                        // Es nuevo de la nube
                        localOrders.push(cloudOrder);
                        changed = true;
                    }
                });
                
                // Si la nube nos actualizó, guardamos y renderizamos
                if (changed) {
                    saveToLocalStorage();
                    updateViews();
                }

                // Subir a la nube lo que tengamos local y que no esté allá o sea más nuevo
                syncLocalToCloud();
            });
        }

        async function syncLocalToCloud() {
            if (!isOnline || !colRef) return;
            // Documentos locales que no están completados hace mucho
            for (const localObj of localOrders) {
                try {
                    // SmartSync usa setDoc con merge
                    await setDoc(doc(db, colRef.path, localObj.id), localObj, { merge: true });
                } catch(e) { console.error("Error subiendo", e); }
            }
        }

        function saveToLocalStorage() {
            // Limpiamos entregados viejos (opcional para no llenar memoria)
            const activeOrders = localOrders.filter(o => o.status !== 'f' || (Date.now() - o.updatedAt < 86400000)); // Borra entregados después de 24h
            localStorage.setItem('scrappy_smartsync', JSON.stringify(activeOrders));
            localOrders = activeOrders;
        }

        // ==========================================
        // 7. GUARDAR Y EDITAR (PUNTO DE ENTRADA)
        // ==========================================
        window.saveOrder = () => {
            const n = document.getElementById('cust-name').value.trim();
            const a = document.getElementById('cust-addr').value.trim();
            const t = document.getElementById('cust-phone').value.trim();
            if(!cart.length || !n || !a) return alert("Faltan datos o productos.");
            
            const total = cart.reduce((s, i) => s + i.total, 0);
            const now = Date.now();
            
            const orderObj = {
                cart, customer: n, address: a, phone: t, total,
                updatedAt: now
            };

            if (editId) {
                // Modo Edición
                const idx = localOrders.findIndex(o => o.id === editId);
                if(idx > -1) {
                    orderObj.id = editId;
                    orderObj.created = localOrders[idx].created;
                    orderObj.timeStr = localOrders[idx].timeStr;
                    orderObj.status = localOrders[idx].status;
                    localOrders[idx] = orderObj;
                }
            } else {
                // Pedido Nuevo
                orderObj.id = 'loc_' + now + '_' + Math.random().toString(36).substr(2, 5); // ID Temporal/Único
                orderObj.created = now;
                orderObj.timeStr = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                orderObj.status = 'p'; // pending
                localOrders.push(orderObj);
            }

            saveToLocalStorage();
            syncLocalToCloud(); // Intenta subir a la nube
            
            cart = []; renderCart(); 
            document.getElementById('cust-name').value = ""; document.getElementById('cust-addr').value = ""; document.getElementById('cust-phone').value = ""; 
            editId = null; document.getElementById('save-text').innerText = "Enviar a Cocina";
            
            updateViews();
            switchTab('kitchen');
        };

        window.editOrd = (id) => {
            const o = localOrders.find(x => x.id === id);
            if(!o) return;
            editId = o.id; cart = [...o.cart];
            document.getElementById('cust-name').value = o.customer;
            document.getElementById('cust-addr').value = o.address;
            document.getElementById('cust-phone').value = o.phone || "";
            document.getElementById('save-text').innerText = "Guardar Cambios";
            renderCart(); switchTab('pos');
        };

        window.upStatus = (id, s) => {
            const idx = localOrders.findIndex(x => x.id === id);
            if(idx > -1) {
                localOrders[idx].status = s;
                localOrders[idx].updatedAt = Date.now();
                saveToLocalStorage();
                syncLocalToCloud();
                updateViews();
            }
        };

        // ==========================================
        // 8. ACTUALIZAR VISTAS DE COCINA Y REPARTO
        // ==========================================
        function updateViews() {
            // Ordenar por creación (los más viejos arriba para que se atiendan primero)
            localOrders.sort((a, b) => a.created - b.created);
            
            const p = localOrders.filter(x => x.status === 'p'); // Pending
            const r = localOrders.filter(x => x.status === 'r'); // Ready

            const bk = document.getElementById('badge-k'); bk.innerText = p.length; bk.style.display = p.length ? 'block' : 'none';
            const bd = document.getElementById('badge-d'); bd.innerText = r.length; bd.style.display = r.length ? 'block' : 'none';

            // COCINA
            document.getElementById('kitchen-list').innerHTML = !p.length ? 
                `<div class="text-center text-slate-300 py-20 font-black uppercase tracking-widest">Cocina Limpia</div>` : 
                p.map(o => `
                <div class="bg-white border-l-8 border-red-500 rounded-3xl p-5 shadow-lg relative">
                    <button onclick="editOrd('${o.id}')" class="absolute top-4 right-4 bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full font-black text-[10px] uppercase">Editar</button>
                    <div class="mb-4 pr-16 border-b border-slate-100 pb-3">
                        <h3 class="font-black text-2xl italic uppercase tracking-tighter text-slate-800">${o.customer}</h3>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="bg-slate-100 px-2 py-0.5 rounded text-[10px] font-black uppercase text-slate-400">${o.timeStr}</span>
                            <span class="clock bg-red-100 text-red-600 px-2 py-0.5 rounded text-[10px] font-black tracking-widest" data-start="${o.created}">⏱️ 00:00</span>
                        </div>
                    </div>
                    <div class="space-y-3 mb-6">
                        ${o.cart.map(i => `
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <div class="font-black text-lg text-slate-800 leading-none">${i.qty}x ${i.n}</div>
                            <div class="text-[10px] font-bold text-slate-500 uppercase mt-2 italic space-y-1">
                                ${i.meat ? `<p class="text-orange-700">🥩 ${i.meat === 'Mixto' ? 'Mixto ('+i.mixed.join('+')+')' : i.meat}</p>` : ''}
                                ${i.removed.length ? `<p class="text-red-500">❌ Sin: ${i.removed.join(', ')}</p>` : ''}
                                ${i.extras.length ? `<p class="text-green-600">➕ Con: ${i.extras.map(x=>x.n).join(', ')}</p>` : ''}
                                ${i.gen ? `<p class="text-purple-600">➕ Extras Gen: x${i.gen}</p>` : ''}
                                ${i.notes ? `<p class="text-blue-500 underline">Nota: ${i.notes}</p>` : ''}
                            </div>
                        </div>`).join('')}
                    </div>
                    <button onclick="upStatus('${o.id}', 'r')" class="w-full bg-red-500 text-white font-black py-5 rounded-2xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-transform">Listo p' Entrega</button>
                </div>`).join('');

            // REPARTO
            document.getElementById('delivery-list').innerHTML = !r.length ? 
                `<div class="text-center text-slate-300 py-20 font-black uppercase tracking-widest">Nada p' Repartir</div>` : 
                r.map(o => `
                <div class="bg-white border-l-8 border-orange-500 rounded-3xl p-5 shadow-lg relative">
                    <button onclick="editOrd('${o.id}')" class="absolute top-4 right-4 bg-slate-100 text-slate-500 px-3 py-1.5 rounded-full font-black text-[10px] uppercase">Editar</button>
                    <div class="flex justify-between items-start mb-4 pr-16 border-b border-slate-100 pb-3">
                        <div>
                            <h3 class="font-black text-2xl italic uppercase tracking-tighter text-slate-800">${o.customer}</h3>
                            <span class="clock bg-orange-100 text-orange-700 px-2 py-0.5 rounded text-[10px] font-black tracking-widest inline-block mt-1" data-start="${o.created}">⏱️ 00:00</span>
                        </div>
                        <span class="bg-slate-800 text-white font-black text-2xl px-4 py-2 rounded-2xl italic shadow-md">$${o.total}</span>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl mb-4 font-black uppercase italic border border-slate-200">
                        <p class="text-[9px] text-slate-400 mb-1 tracking-widest font-bold">📍 Dirección</p>
                        <p class="text-xl leading-tight text-slate-700">${o.address}</p>
                    </div>
                    ${o.phone ? `
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <a href="tel:${o.phone}" class="bg-blue-50 text-blue-600 font-black py-4 rounded-2xl flex flex-col items-center shadow-sm active:scale-95 border border-blue-100"><i class="fa-solid fa-phone text-xl mb-1"></i><span class="text-[9px] uppercase tracking-widest">Llamar</span></a>
                        <a href="https://wa.me/52${o.phone.replace(/\D/g,'')}" target="_blank" class="bg-green-50 text-green-600 font-black py-4 rounded-2xl flex flex-col items-center shadow-sm active:scale-95 border border-green-100"><i class="fa-brands fa-whatsapp text-xl mb-1"></i><span class="text-[9px] uppercase tracking-widest">WhatsApp</span></a>
                    </div>` : ''}
                    <div class="flex gap-3">
                        <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.address)}')" class="flex-1 bg-slate-100 text-slate-600 font-black py-5 rounded-2xl text-[10px] uppercase tracking-widest active:scale-95 transition-transform"><i class="fa-solid fa-map-location-dot text-xl mb-1 block"></i> Mapa</button>
                        <button onclick="upStatus('${o.id}', 'f')" class="flex-[2] bg-orange-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase italic tracking-widest active:scale-95 transition-transform"><i class="fa-solid fa-check text-xl mb-1 block"></i> Entregado</button>
                    </div>
                </div>`).join('');
            
            updateClocks();
        }

        function updateClocks() {
            document.querySelectorAll('.clock').forEach(el => {
                const s = parseInt(el.getAttribute('data-start'));
                const diff = Math.floor((Date.now() - s) / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const sc = (diff % 60).toString().padStart(2, '0');
                el.innerText = `⏱️ ${m}:${sc}`;
                if(diff > 900) el.classList.add('timer-alert'); // > 15 mins
            });
        }

        window.switchTab = (t) => {
            ['pos', 'kitchen', 'delivery'].forEach(n => {
                document.getElementById('view-'+n).classList.add('hidden');
                document.getElementById('btn-'+n).className = "flex-1 py-4 flex flex-col items-center tab-inactive transition-all";
            });
            document.getElementById('view-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).className = "flex-1 py-4 flex flex-col items-center tab-active transition-all";
        };

        // INICIAR
        initMenuUI();
        startFirebase();
    </script>
</body>
</html>
